<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <title>ゆびさきアトリエ — Shizuku Engine 4.0 α v0.9 Living Paint</title>
  <link rel="stylesheet" href="css/main.css?v=4a8">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">SHIZUKU ENGINE 4.0 α · v0.9 PAINT BUDGET</div>
        <h1>ぷに・にゅる えのぐ</h1>
      </div>
      <button id="resetButton" class="icon-button" type="button" aria-label="やりなおす">↻</button>
    </header>

    <section class="workspace" aria-label="絵の具を触る場所">
      <canvas id="paintCanvas"></canvas>
      <div class="instruction">
        <strong>なんどでも 色を たしてみよう</strong>
        <small>少しずつ出せて、新しい色も何度でも混ぜられます</small>
      </div>
      <div class="badge">PAINT BUDGET 2.0</div>
    </section>

    <section class="controls">
      <div class="colors" role="group" aria-label="色を選ぶ">
        <button class="color selected" data-color="#e84a68" style="--c:#e84a68" aria-label="あか"></button>
        <button class="color" data-color="#f28c28" style="--c:#f28c28" aria-label="だいだい"></button>
        <button class="color" data-color="#efc84a" style="--c:#efc84a" aria-label="きいろ"></button>
        <button class="color" data-color="#31ad78" style="--c:#31ad78" aria-label="みどり"></button>
        <button class="color" data-color="#278ec7" style="--c:#278ec7" aria-label="あお"></button>
        <button class="color" data-color="#8259c9" style="--c:#8259c9" aria-label="むらさき"></button>
      </div>
      <button id="addPaintButton" class="add-button" type="button">＋ えのぐを たす</button>
    </section>

    <div class="stats" aria-live="polite">
      <span>えのぐ <b id="massValue">0かい 追加</b></span>
      <span>新しい色の場所をいつも確保</span>
    </div>
  </main>
  <script src="js/shizuku-engine.js?v=4a8"></script>
</body>
</html>
