<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#ff9f1c">
  <title>ゆびさきアトリエ — Shizuku Rebuild M1</title>
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="css/main.css?v=rebuild-m1">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">SHIZUKU REBUILD M1</div>
        <h1>なめらかな えのぐ</h1>
      </div>
      <button id="resetButton" class="icon-button" type="button" aria-label="やりなおす">↻</button>
    </header>

    <section class="workspace" aria-label="絵の具を触る場所">
      <canvas id="paintCanvas"></canvas>
      <div id="emptyHint" class="empty-hint">
        <span class="finger">☝️</span>
        <strong>えのぐを おしてみよう</strong>
        <small>おして「ぷに」・はなして「ぷるん」</small>
      </div>
      <div class="version-chip">旧エンジン不使用</div>
    </section>

    <section class="controls" aria-label="絵の具の操作">
      <div class="colors" role="group" aria-label="色をえらぶ">
        <button class="color selected" data-color="#ef476f" style="--c:#ef476f" aria-label="あか"></button>
        <button class="color" data-color="#ff9f1c" style="--c:#ff9f1c" aria-label="だいだい"></button>
        <button class="color" data-color="#ffd166" style="--c:#ffd166" aria-label="きいろ"></button>
        <button class="color" data-color="#06d6a0" style="--c:#06d6a0" aria-label="みどり"></button>
        <button class="color" data-color="#118ab2" style="--c:#118ab2" aria-label="あお"></button>
        <button class="color" data-color="#8b5cf6" style="--c:#8b5cf6" aria-label="むらさき"></button>
      </div>
      <button id="addPaintButton" class="add-button" type="button">
        <span>＋</span> えのぐを だす
      </button>
    </section>

    <p class="note">M1では単色だけを扱います。指で触れても、絵の具の量や色は増えません。</p>
  </main>
  <script src="js/shizuku-engine.js?v=rebuild-m1"></script>
<script>if("serviceWorker" in navigator){addEventListener("load",()=>navigator.serviceWorker.register("./sw.js"));}</script>
</body>
</html>
