<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
  <meta name="theme-color" content="#f59e0b">
  <title>ゆびさきアトリエ — Shizuku Engine 4.0 α v0.7 Marble Mixing</title>
  <link rel="stylesheet" href="css/main.css?v=4a7">
</head>
<body>
  <main class="app">
    <header class="topbar">
      <div>
        <div class="eyebrow">SHIZUKU ENGINE 4.0 α · v0.7 MARBLE MIXING</div>
        <h1>ぷに・にゅる えのぐ</h1>
      </div>
      <button id="resetButton" class="icon-button" type="button" aria-label="やりなおす">↻</button>
    </header>

    <section class="workspace" aria-label="絵の具を触る場所">
      <canvas id="paintCanvas"></canvas>
      <div class="instruction">
        <strong>ちがう色を たして、こねてみよう</strong>
        <small>触れた境界から筋になり、こねるほど少しずつ色が混ざります</small>
      </div>
      <div class="badge">MARBLE MIXING 1.0</div>
    </section>

    <section class="controls">
      <div class="colors" role="group" aria-label="色を選ぶ">
        <button class="color selected" data-color="#e84a68" style="--c:#e84a68" aria-label="あか"></button>
        <button class="color" data-color="#f28c28" style="--c:#f28c28" aria-label="だいだい"></button>
        <button class="color" data-color="#efc84a" style="--c:#efc84a" aria-label="きいろ"></button>
        <button class="color" data-color="#31ad78" style="--c:#31ad78" aria-label="みどり"></button>
        <button class="color" data-color="#278ec7" style="--c:#278ec7" aria-label="あお"></button>
        <button class="color" data-color="#8259c9" style="--c:#8259c9" aria-label="むらさき"></button>
      </div>
      <button id="addPaintButton" class="add-button" type="button">＋ えのぐを たす</button>
    </section>

    <div class="stats" aria-live="polite">
      <span>絵の具量 <b id="massValue">100%</b></span>
      <span>触った回数で増えません</span>
    </div>
  </main>
  <script src="js/shizuku-engine.js?v=4a7"></script>
</body>
</html>
